<style>
        .halo-glow {
            box-shadow: 0 0 40px 10px rgba(236, 194, 70, 0.2);
        }
        .glass-panel {
            background: rgba(30, 32, 29, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(236, 194, 70, 0.15);
        }
        .cross-pattern {
            background-image: radial-gradient(circle, rgba(236, 194, 70, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .shimmer-gold {
            background: linear-gradient(90deg, transparent, rgba(253, 250, 240, 0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Subtle Background Elements -->
<div class="fixed inset-0 z-0 cross-pattern pointer-events-none"></div>
<div class="fixed inset-0 z-0 bg-gradient-to-b from-navy-dark via-background to-background pointer-events-none"></div>
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex items-center justify-center p-margin-mobile">
<!-- Central Glass Container -->
<div class="glass-panel w-full max-w-[420px] rounded-3xl p-xl shadow-2xl flex flex-col items-center animate-in fade-in slide-in-from-bottom-8 duration-700">
<!-- Header Section -->
<div class="mb-lg flex flex-col items-center text-center">
<div class="relative mb-md">
<!-- Halo Effect behind Icon -->
<div class="absolute inset-0 bg-secondary/20 blur-xl rounded-full animate-pulse"></div>
<div class="relative w-16 h-16 bg-gradient-to-br from-secondary to-secondary-container rounded-2xl flex items-center justify-center shadow-lg transform rotate-3 hover:rotate-0 transition-transform duration-300">
<span class="material-symbols-outlined text-4xl text-on-primary-fixed" data-weight="fill">lock</span>
</div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-secondary tracking-tight mb-xs">
                    Akses Pentadbir
                </h1>
<p class="text-on-surface-variant font-body-md max-w-[280px]">
                    Sila masukkan kod laluan rahsia untuk teruskan.
                </p>
</div>
<!-- PIN/Passphrase Form -->
<form class="w-full space-y-lg" onsubmit="return false">
<div class="space-y-sm">
<label class="text-label-md font-label-md text-secondary/80 ml-1 uppercase tracking-widest">Kod Rahsia</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-lg py-4 text-secondary text-center tracking-[0.5em] text-lg focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/20 transition-all duration-300 placeholder:text-on-surface-variant/30" placeholder="••••••••" type="password"/>
<!-- Interactive Shimmer on Focus -->
<div class="absolute bottom-0 left-0 h-0.5 w-full bg-secondary scale-x-0 group-focus-within:scale-x-100 transition-transform duration-500 origin-center rounded-full"></div>
</div>
</div>
<!-- Admin Action Button -->
<button class="w-full group relative overflow-hidden bg-secondary text-on-primary font-headline-md text-headline-md py-4 rounded-xl shadow-lg shadow-secondary/10 hover:shadow-secondary/30 active:scale-[0.98] transition-all duration-300">
<span class="relative z-10 flex items-center justify-center gap-2">
                        Log Masuk Admin
                        <span class="material-symbols-outlined transform group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
<!-- Button Shine Effect -->
<div class="absolute inset-0 shimmer-gold opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</form>
<!-- Divider -->
<div class="flex items-center w-full my-lg">
<div class="flex-grow h-px bg-outline-variant/30"></div>
<div class="px-md">
<span class="material-symbols-outlined text-secondary/40 text-sm">chess</span>
</div>
<div class="flex-grow h-px bg-outline-variant/30"></div>
</div>
<!-- Footer Link -->
<a class="flex items-center gap-2 text-on-surface-variant hover:text-secondary font-label-md text-label-md transition-colors group" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                Kembali ke Log Masuk
            </a>
</div>
</main>
<!-- Version Footer (Purely Visual) -->
<footer class="relative z-10 p-md flex justify-center opacity-30 select-none">
<p class="font-version-text text-version-text tracking-widest">KATOLIKGO V2.0 • AKSES TERHAD</p>
</footer>
<!-- Atmosphere & Interactions -->
<script>
        // Simple micro-interaction for password visibility or feedback
        const input = document.querySelector('input');
        input.addEventListener('input', (e) => {
            if(e.target.value.length > 0) {
                e.target.classList.add('halo-glow');
            } else {
                e.target.classList.remove('halo-glow');
            }
        });

        // Background subtle movement effect
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.blur-\\[120px\\]');
            const x = (e.clientX / window.innerWidth) * 50;
            const y = (e.clientY / window.innerHeight) * 50;
            glow.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        });
    </script>
