<!DOCTYPE html>

<html lang="ms"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KatolikGo - Log Masuk</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Typography -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'katolik-navy': '#1a3a5c',
            'katolik-gold': '#c9a227',
            'katolik-burgundy': '#4a1024',
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    /* Subtle overlay to ensure text readability over the background image */
    .bg-overlay {
      background: linear-gradient(to bottom, rgba(26, 58, 92, 0.2) 0%, rgba(26, 58, 92, 0.7) 50%, rgba(26, 58, 92, 0.95) 100%);
    }

    /* Soft glow effect for the main container */
    .glass-effect {
      backdrop-filter: blur(2px);
    }

    /* Consistent button transition */
    .btn-transition {
      transition: all 0.3s ease;
    }
    .btn-transition:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body class="bg-black font-sans text-white antialiased overflow-hidden">
<!-- BEGIN: Main Background Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-end">
<!-- Background Image Layer -->
<div class="absolute inset-0 z-0">
<img alt="Background Chapel" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/AP1WRLtIBYHek6XhBx9z92MVhtzuhsbbCVyqpJmMaaBI7olM8v7PKgh9E9RcDf-5hpoUzG46ja8-sOSUyx3UaYvhvRZr5fmHEWVXOHMeQYdy_rk0gGGH_ClmDdrGnsyq3GJg743p-dKOIM0GaHYI0mb0M_tMbi6jHuYZHq9gIDwipxnztWZhKGkuL3jZu-nHbu71TG1vUASxkmF34S2qBLKcM2w5unZ-GBuPuKO1xelj5YKD-uMGGM73w7O20m6f"/>
<div class="absolute inset-0 bg-overlay"></div>
</div>
<!-- BEGIN: Content Area -->
<section class="relative z-10 w-full max-w-md px-8 pb-12 flex flex-col items-center text-center">
<!-- Typography Section -->
<header class="mb-10">
<h1 class="font-serif text-4xl md:text-5xl text-katolik-gold mb-4 leading-tight">
          Iman, diperdalamkan
        </h1>
<p class="text-gray-200 text-lg font-light italic">
          Perjalanan rohani anda berada di tangan yang baik.
        </p>
</header>
<!-- BEGIN: Social & Email Actions -->
<div class="w-full space-y-4 mb-8" data-purpose="auth-buttons">
<!-- Apple Login -->
<button class="w-full flex items-center justify-center space-x-3 py-4 rounded-xl bg-katolik-gold text-white font-medium shadow-lg border border-yellow-600/30 btn-transition">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"></path></svg>
<span class="text-lg">Teruskan dengan Apple</span>
</button>
<!-- Google Login -->
<button class="w-full flex items-center justify-center space-x-3 py-4 rounded-xl bg-katolik-navy text-white font-medium shadow-lg border border-blue-900/30 btn-transition">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 488 512"><path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"></path></svg>
<span class="text-lg">Teruskan dengan Google</span>
</button>
<!-- Email Login -->
<button class="w-full flex items-center justify-center space-x-3 py-4 rounded-xl bg-katolik-burgundy text-white font-medium shadow-lg border border-red-950/30 btn-transition">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-lg">Teruskan dengan E-mel</span>
</button>
</div>
<!-- END: Social & Email Actions -->
<!-- BEGIN: Guest Access & Legal -->
<footer class="mt-4 flex flex-col items-center space-y-6">
<button class="text-katolik-gold hover:text-white transition-colors underline underline-offset-4 decoration-katolik-gold/50 text-lg font-medium">
          Teruskan sebagai Tetamu
        </button>
<div class="flex space-x-4 text-xs text-gray-400 font-light tracking-wide uppercase">
<a class="hover:text-white transition-colors" href="#">Syarat Penggunaan</a>
<span class="text-gray-600">|</span>
<a class="hover:text-white transition-colors" href="#">Dasar Privasi</a>
</div>
</footer>
<!-- END: Guest Access & Legal -->
</section>
<!-- END: Content Area -->
</main>
<!-- END: Main Background Container -->
</body></html>
