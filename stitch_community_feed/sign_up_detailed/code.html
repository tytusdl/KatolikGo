<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-background text-on-background font-body-md min-h-screen selection:bg-secondary selection:text-on-secondary">
<!-- Top App Bar (Suppressing global nav shell for transactional screen, but using brand anchor logic) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile py-base bg-transparent">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-headline-lg-mobile" style="font-variation-settings: 'FILL' 1;">chess</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-secondary tracking-tight">KatolikGo</h1>
</div>
<button class="p-2 text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">help_outline</span>
</button>
</header>
<main class="relative min-h-screen flex flex-col items-center justify-start bg-serene-chapel pt-24 pb-12 px-margin-mobile">
<!-- Welcome Header -->
<div class="w-full max-w-md text-center mb-xl">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-cream-soft mb-xs">Sign Up</h2>
<p class="font-body-md text-on-surface-variant italic">Your spiritual journey is in good hands.</p>
<p class="font-label-md text-secondary mt-2">Daftar Akaun Baru</p>
</div>
<!-- Form Container -->
<div class="w-full max-w-md glass-panel p-lg rounded-xl border border-secondary/20 shadow-2xl">
<form action="#" class="space-y-md">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">person</span> Full Name
                    </label>
<input class="w-full bg-cream-soft text-navy-dark px-md py-sm rounded-lg border border-secondary/30 focus:border-secondary transition-all font-body-md" placeholder="Nama Penuh" type="text"/>
</div>
<!-- Username -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">alternate_email</span> Username
                    </label>
<input class="w-full bg-cream-soft text-navy-dark px-md py-sm rounded-lg border border-secondary/30 focus:border-secondary transition-all font-body-md" placeholder="Nama Pengguna" type="text"/>
</div>
<!-- Chapel/Parish Name -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">church</span> Chapel Name
                    </label>
<input class="w-full bg-cream-soft text-navy-dark px-md py-sm rounded-lg border border-secondary/30 focus:border-secondary transition-all font-body-md" placeholder="Nama Gereja / Kapel" type="text"/>
</div>
<!-- Diocese Selection -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">account_balance</span> Diocese
                    </label>
<select class="w-full bg-cream-soft text-navy-dark px-md py-sm rounded-lg border border-secondary/30 focus:border-secondary transition-all font-body-md appearance-none">
<option value="">Pilih Keuskupan</option>
<option value="kuala-lumpur">Archdiocese of Kuala Lumpur</option>
<option value="kota-kinabalu">Archdiocese of Kota Kinabalu</option>
<option value="kuching">Archdiocese of Kuching</option>
<option value="penang">Diocese of Penang</option>
<option value="malacca-johor">Diocese of Malacca-Johor</option>
</select>
</div>
<!-- Email Address -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">mail</span> Email Address
                    </label>
<input class="w-full bg-cream-soft text-navy-dark px-md py-sm rounded-lg border border-secondary/30 focus:border-secondary transition-all font-body-md" placeholder="Alamat Emel" type="email"/>
</div>
<!-- Password Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">lock</span> Password
                        </label>
<input class="w-full bg-cream-soft text-navy-dark px-md py-sm rounded-lg border border-secondary/30 focus:border-secondary transition-all font-body-md" placeholder="Kata Laluan" type="password"/>
</div>
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">verified_user</span> Confirm
                        </label>
<input class="w-full bg-cream-soft text-navy-dark px-md py-sm rounded-lg border border-secondary/30 focus:border-secondary transition-all font-body-md" placeholder="Sahkan" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 w-5 h-5 rounded border-secondary text-secondary-container focus:ring-secondary" id="terms" type="checkbox"/>
<label class="font-version-text text-on-surface-variant" for="terms">
                        By creating an account, I agree to the <a class="text-secondary hover:underline" href="#">Terms of Service</a> and <a class="text-secondary hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-secondary-container hover:bg-secondary text-on-secondary-fixed font-headline-md text-headline-md py-4 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2 mt-lg halo-glow-effect" type="submit">
                    Create Account
                    <span class="material-symbols-outlined">app_registration</span>
</button>
</form>
</div>
<!-- Footer Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-secondary font-semibold hover:underline ml-1" href="#">Sign In</a>
</p>
</div>
<!-- Aesthetic Decoration -->
<div class="mt-xl opacity-20 flex flex-col items-center">
<div class="h-px w-24 bg-secondary mb-base"></div>
<p class="text-[10px] uppercase tracking-[0.3em] font-bold text-secondary">Laudato Si'</p>
</div>
</main>
<!-- Contextual Success Interaction (Mock) -->
<script>
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Processing...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Welcome!';
                btn.classList.replace('bg-secondary-container', 'bg-tertiary-container');
                btn.classList.add('text-on-tertiary-container');
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-tertiary-container', 'bg-secondary-container');
                    btn.classList.remove('text-on-tertiary-container');
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        });
    </script>
</body></html>
