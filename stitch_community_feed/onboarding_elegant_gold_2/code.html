<style>
        body {
            background-color: #0e2a4d; /* Navy Dark Fallback */
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .mesh-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% 50%, rgba(236, 194, 70, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(14, 42, 77, 1) 0%, rgba(18, 20, 17, 1) 100%);
        }

        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(236, 194, 70, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(236, 194, 70, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
        }

        .halo-glow-effect {
            box-shadow: 0 0 60px 10px rgba(236, 194, 70, 0.2);
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .animate-float {
            animation: floating 4s ease-in-out infinite;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(236, 194, 70, 0.1);

<script>
        function handleNavigation() {
            // Implementation for button press effect
            const btn = document.querySelector('button');
            btn.style.transform = 'scale(0.98)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
                console.log('Navigating to next onboarding step...');
            }, 100);
        }

        // Ambient micro-interaction: Subtle parallax on mouse move
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            
            const bible = document.querySelector('.animate-float');
            if (bible) {
                bible.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }

            const grid = document.querySelector('.grid-pattern');
            if (grid) {
                grid.style.transform = `translate(${-moveX * 0.5}px, ${-moveY * 0.5}px)`;
            }
        });
    </script>
