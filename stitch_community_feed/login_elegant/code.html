<!-- Subtle Floating Particles for atmosphere -->
<div class="absolute inset-0 pointer-events-none overflow-hidden" id="particle-container"></div>
<script>
        // Simple ambient particle effect
        const container = document.getElementById('particle-container');
        const particleCount = 15;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'absolute bg-secondary/20 rounded-full blur-[2px]';
            
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            
            const duration = Math.random() * 15 + 15;
            const delay = Math.random() * 10;
            
            particle.style.animation = `float ${duration}s ease-in-out ${delay}s infinite`;
            
            container.appendChild(particle);
        }

        // Add keyframes for floating
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
                25% { opacity: 0.4; }
                50% { transform: translateY(-100px) translateX(20px); opacity: 0.6; }
                75% { opacity: 0.4; }
            }
        `;
        document.head.appendChild(style);

        // Visual feedback for button interactions
        const buttons = document.querySelectorAll('.btn-hover-effect');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Potential ripple effect or navigation logic
            });
        });
