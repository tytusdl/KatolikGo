<script>
        function openBadge(title, desc, date, reward, icon) {
            const modal = document.getElementById('badge-modal');
            const content = document.getElementById('modal-content');
            const overlay = document.getElementById('modal-overlay');
            const iconContainer = document.getElementById('badge-icon-container');
            const statusLabel = document.querySelector('#badge-date').previousElementSibling;

            // Update content
            document.getElementById('badge-title').innerText = title;
            document.getElementById('badge-desc').innerText = desc;
            document.getElementById('badge-date').innerText = date;
            document.getElementById('badge-reward').innerText = reward;
            document.getElementById('badge-icon').innerText = icon;

            // Handle Locked vs Unlocked Styling
            if (date === 'Terkunci') {
                iconContainer.classList.add('grayscale', 'opacity-50');
                iconContainer.classList.remove('badge-glow', 'border-secondary/40');
                iconContainer.classList.add('border-outline-variant/30');
                document.getElementById('badge-icon').style.fontVariationSettings = "'FILL' 0";
            } else {
                iconContainer.classList.remove('grayscale', 'opacity-50');
                iconContainer.classList.add('badge-glow', 'border-secondary/40');
                iconContainer.classList.remove('border-outline-variant/30');
                document.getElementById('badge-icon').style.fontVariationSettings = "'FILL' 1";
            }

            // Show modal
            modal.classList.remove('invisible');
            overlay.classList.add('opacity-100');
            content.classList.remove('translate-y-full');
        }

        function closeBadge() {
            const modal = document.getElementById('badge-modal');
            const content = document.getElementById('modal-content');
            const overlay = document.getElementById('modal-overlay');

            content.classList.add('translate-y-full');
            overlay.classList.remove('opacity-100');
            
            setTimeout(() => {
                modal.classList.add('invisible');
            }, 300);
        }
    </script>
