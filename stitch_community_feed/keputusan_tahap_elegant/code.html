<script>
        // Micro-interaction for the result number counting up
        document.addEventListener('DOMContentLoaded', () => {
            const scoreElement = document.querySelector('.text-5xl');
            let count = 0;
            const target = 85;
            const duration = 1500;
            const increment = target / (duration / 16);
            
            const updateCount = () => {
                count += increment;
                if (count < target) {
                    scoreElement.innerText = Math.floor(count) + '%';
                    requestAnimationFrame(updateCount);
                } else {
                    scoreElement.innerText = target + '%';
                }
            };
            updateCount();
        });
    </script>
