<script>
        // Simple Interaction for selection count
        const checkboxes = document.querySelectorAll('.custom-checkbox');
        const mainBtn = document.querySelector('button.bg-secondary');
        const originalText = mainBtn.innerHTML;

        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                const checkedCount = document.querySelectorAll('.custom-checkbox:checked').length;
                if (checkedCount > 0) {
                    mainBtn.innerHTML = `<span class="material-symbols-outlined">send</span> Hantar Jemputan (${checkedCount})`;
                } else {
                    mainBtn.innerHTML = originalText;
                }
            });
        });
