<!DOCTYPE html>

<html class="dark" lang="ms"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KatolikGo - Daftar Akaun Baru</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Plus+Jakarta+Sans:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(30, 32, 29, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(236, 194, 70, 0.2);
        }
        .halo-glow-focus:focus-within {
            box-shadow: 0 0 15px rgba(201, 162, 39, 0.3);
            border-color: #ecc246;
        }
        .bg-divine-gradient {
            background: radial-gradient(circle at center, #1a3a5c 0%, #121411 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error": "#ffb4ab",
                      "status-error": "#c62828",
                      "on-surface-variant": "#c3c6cf",
                      "primary-container": "#1a3a5c",
                      "outline": "#8d9199",
                      "primary-fixed": "#d2e4ff",
                      "on-tertiary-fixed": "#410008",
                      "navy-dark": "#0e2a4d",
                      "surface-container": "#1e201d",
                      "inverse-surface": "#e3e3de",
                      "secondary-fixed": "#ffe08e",
                      "surface-dim": "#121411",
                      "on-tertiary-container": "#ff787c",
                      "halo-glow": "rgba(201, 162, 39, 0.3)",
                      "on-secondary-container": "#352800",
                      "surface-container-low": "#1a1c19",
                      "inverse-on-surface": "#2f312e",
                      "on-primary-fixed-variant": "#2a486b",
                      "surface-container-high": "#292a27",
                      "tertiary-container": "#730e1c",
                      "surface-tint": "#abc9f2",
                      "surface-bright": "#383a36",
                      "primary": "#abc9f2",
                      "on-surface": "#e3e3de",
                      "on-tertiary": "#670315",
                      "outline-variant": "#43474e",
                      "on-primary": "#103253",
                      "inverse-primary": "#436084",
                      "error-container": "#93000a",
                      "background": "#121411",
                      "on-error-container": "#ffdad6",
                      "on-background": "#e3e3de",
                      "surface-container-highest": "#333532",
                      "tertiary-fixed-dim": "#ffb3b2",
                      "on-primary-fixed": "#001c37",
                      "on-secondary": "#3d2e00",
                      "secondary-container": "#b18c09",
                      "primary-fixed-dim": "#abc9f2",
                      "cream-soft": "#fdfaf0",
                      "secondary": "#ecc246",
                      "on-primary-container": "#87a4cc",
                      "surface-container-lowest": "#0d0f0c",
                      "on-tertiary-fixed-variant": "#871e28",
                      "tertiary": "#ffb3b2",
                      "secondary-fixed-dim": "#ecc246",
                      "surface-variant": "#333532",
                      "surface": "#121411",
                      "on-error": "#690005",
                      "on-secondary-fixed": "#241a00",
                      "tertiary-fixed": "#ffdad9",
                      "on-secondary-fixed-variant": "#584400"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xl": "32px",
                      "md": "16px",
                      "margin-mobile": "20px",
                      "margin-desktop": "40px",
                      "base": "8px",
                      "lg": "24px",
                      "xs": "4px",
                      "sm": "12px",
                      "gutter": "16px"
              },
              "fontFamily": {
                      "headline-md": ["Plus Jakarta Sans"],
                      "label-md": ["Inter"],
                      "headline-lg-mobile": ["Plus Jakarta Sans"],
                      "headline-lg": ["Plus Jakarta Sans"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "version-text": ["Inter"]
              },
              "fontSize": {
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                      "version-text": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "400"}]
              }
            },
          },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden min-h-screen">
<!-- Hero Background Wrapper -->
<div class="fixed inset-0 z-0">
<div class="w-full h-full bg-cover bg-center opacity-40" data-alt="A serene and ethereal digital painting of a modern minimalist chapel interior at dawn. Soft, golden light streams through a tall, narrow stained-glass window in the shape of a cross, casting a gentle halo glow on the polished stone floor. The atmosphere is quiet, sacred, and premium, with a deep navy and charcoal color palette highlighted by rich gold accents. The style is cinematic and spiritually uplifting." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBcvP42ZwOgnWcX1-5uGAPGxYlMw5pZ43zknIhUEDli2dd2D1dha12YlwGMaTRD4vPcQjcJ59tX3F1J0Tofxr_6LL2_Y3BsXWZo4687rXiOtopB6oCUwY6N08c5eY3Podkc614-N4IJWdL-2e4ZzAYD0wBd7TK85ADaJZgN0GyPBlLWO_HyZLKgCHIkftX7ulHaAr6aUQ6Wzuu8nDgSbNI7bRjrIjAKwSKreh74eUXo0rZ_6bXCNLxQDR4nmNC0lFfnQEiijyGgf_Eb')"></div>
<div class="absolute inset-0 bg-divine-gradient opacity-80 mix-blend-multiply"></div>
</div>
<!-- Main Content Area -->
<main class="relative z-10 flex flex-col items-center justify-start min-h-screen px-margin-mobile py-xl md:py-margin-desktop">
<!-- Header Branding -->
<div class="flex flex-col items-center text-center mb-xl animate-fade-in">
<div class="mb-sm text-secondary">
<span class="material-symbols-outlined !text-5xl" style="font-variation-settings: 'FILL' 1;">church</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-xs">Daftar Akaun Baru</h1>
<p class="font-body-md text-on-surface-variant max-w-xs italic">Perjalanan rohani anda bermula di sini.</p>
</div>
<!-- Registration Form Card -->
<div class="glass-card w-full max-w-md rounded-xl p-lg shadow-2xl space-y-md">
<form class="space-y-sm" id="signUpForm" onsubmit="event.preventDefault();">
<!-- Nama Penuh -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-primary ml-1">Nama Penuh</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">person</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-on-surface placeholder:text-outline-variant focus:outline-none halo-glow-focus transition-all duration-200" placeholder="Masukkan nama penuh anda" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm">
<!-- Username -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-primary ml-1">Username</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 px-4 text-on-surface placeholder:text-outline-variant focus:outline-none halo-glow-focus transition-all duration-200" placeholder="@username" type="text"/>
</div>
<!-- Diosis -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-primary ml-1">Diosis</label>
<select class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 px-4 text-on-surface focus:outline-none halo-glow-focus transition-all duration-200 appearance-none">
<option value="">Pilih Diosis</option>
<option value="KL">Archdiocese of Kuala Lumpur</option>
<option value="KK">Archdiocese of Kota Kinabalu</option>
<option value="KCH">Archdiocese of Kuching</option>
<option value="MLK">Diocese of Melaka-Johor</option>
</select>
</div>
</div>
<!-- Nama Gereja -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-primary ml-1">Nama Gereja / Kapel</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">location_on</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-on-surface placeholder:text-outline-variant focus:outline-none halo-glow-focus transition-all duration-200" placeholder="Gereja Kariah anda" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-primary ml-1">Alamat Emel</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">mail</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-on-surface placeholder:text-outline-variant focus:outline-none halo-glow-focus transition-all duration-200" placeholder="contoh@emel.com" type="email"/>
</div>
</div>
<!-- Kata Laluan Wrapper -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm">
<div class="space-y-xs relative">
<label class="font-label-md text-label-md text-primary ml-1">Kata Laluan</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 px-4 text-on-surface placeholder:text-outline-variant focus:outline-none halo-glow-focus transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-[38px] text-outline-variant hover:text-secondary" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined text-base">visibility</span>
</button>
</div>
<div class="space-y-xs relative">
<label class="font-label-md text-label-md text-primary ml-1">Sahkan Kata Laluan</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 px-4 text-on-surface placeholder:text-outline-variant focus:outline-none halo-glow-focus transition-all duration-200" id="confirm-password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-[38px] text-outline-variant hover:text-secondary" onclick="togglePassword('confirm-password')" type="button">
<span class="material-symbols-outlined text-base">visibility</span>
</button>
</div>
</div>
<!-- Terms -->
<div class="flex items-start pt-sm">
<input class="mt-1 rounded border-outline-variant bg-surface-container-low text-secondary focus:ring-secondary cursor-pointer" id="terms" type="checkbox"/>
<label class="ml-2 font-label-md text-on-surface-variant leading-tight" for="terms">
                        Saya setuju dengan <a class="text-secondary hover:underline" href="#">Terma</a> & <a class="text-secondary hover:underline" href="#">Dasar Privasi</a>.
                    </label>
</div>
<!-- Submit -->
<button class="w-full bg-secondary text-on-secondary-container font-headline-md text-headline-md py-4 rounded-xl shadow-lg hover:brightness-110 active:scale-[0.98] transition-all duration-150 mt-sm" type="submit">
                    Daftar Sekarang
                </button>
</form>
<!-- Bottom Redirect -->
<div class="text-center pt-md">
<p class="font-label-md text-on-surface-variant">
                    Sudah ada akaun? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Log Masuk</a>
</p>
</div>
</div>
<!-- Footer Branding -->
<footer class="mt-xl flex flex-col items-center space-y-sm text-center">
<div class="flex items-center space-x-2 opacity-60">
<span class="material-symbols-outlined text-primary text-sm">chess</span>
<span class="font-version-text text-version-text tracking-widest uppercase">KatolikGo</span>
</div>
<p class="text-version-text text-outline-variant italic">"Laudato Si’ - Terpujilah Engkau"</p>
</footer>
</main>
<script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const btn = input.nextElementSibling.querySelector('span');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                btn.textContent = 'visibility';
            }
        }

        // Add small animation effects for inputs
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('scale-[1.01]');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
